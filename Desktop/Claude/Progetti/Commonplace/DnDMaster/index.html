<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&amp;D Master</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1208" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="D&D Master" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error catcher — shows error on screen before React loads
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;background:#1a0a0a;color:#e74c3c;font-family:monospace;font-size:14px">' +
          '<b style="font-size:18px">Errore JavaScript</b><br><br>' +
          '<b>Messaggio:</b> ' + msg + '<br>' +
          '<b>File:</b> ' + src + '<br>' +
          '<b>Riga:</b> ' + line + ':' + col + '<br><br>' +
          '<b>Stack:</b><br><pre style="white-space:pre-wrap;font-size:12px;color:#aaa">' + (err && err.stack ? err.stack : 'N/A') + '</pre>' +
          '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;background:#1a0a0a;color:#e74c3c;font-family:monospace;font-size:14px">' +
          '<b style="font-size:18px">Promise Error</b><br><br>' +
          (e.reason ? e.reason.toString() : 'Unknown') +
          '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
