        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontStyle:'italic',color:t.textSec,marginBottom:12}}>Episodi salvati</h3>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {active.episodes.map(ep=>{
            const isCurrent=player?.episode?.id===ep.id;const isPlaying=isCurrent&&player?.playing;
            return(
              <div key={ep.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:isCurrent?t.accentBg:t.bgCard,border:`1px solid ${isCurrent?t.accent:t.borderLight}`,borderRadius:10,boxShadow:`0 1px 6px ${t.shadow}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,color:t.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{ep.title}</p>
                  <p style={{fontSize:12,color:t.textSec,fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ep.podcastTitle}{ep.duration_sec?` · ${formatDuration(ep.duration_sec)}`:''}</p>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button onClick={()=>player?.play(ep,{title:ep.podcastTitle,cover_url:''})} style={{width:30,height:30,borderRadius:'50%',background:isCurrent?t.accent:t.bgAlt,border:`1px solid ${isCurrent?t.accent:t.border}`,color:isCurrent?'#fff':t.textSec,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{isPlaying?'⏸':'▶'}</button>
                  <button onClick={()=>onRemoveEpisode&&onRemoveEpisode(active.id,ep.id)} style={{width:30,height:30,borderRadius:'50%',background:'none',border:`1px solid ${t.border}`,color:t.textMuted,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>}
      {activePodcasts.length===0&&(active.episodes||[]).length===0&&
        <p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'30px 0'}}>Collezione vuota.</p>}
    </div>
  );
  return(
    <div className="fu">
      <div style={{background:t.bgCard,border:`1px solid ${t.borderLight}`,borderRadius:12,padding:'16px 18px',marginBottom:24,boxShadow:`0 1px 8px ${t.shadow}`}}>
        <p style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontStyle:'italic',color:t.textSec,marginBottom:10}}>Nuova collezione</p>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()}
            placeholder="Nome collezione..." style={{flex:1,minWidth:140,padding:'8px 12px',background:t.bgAlt,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontSize:14}}/>
          <div style={{display:'flex',gap:4}}>
            {COLLECTION_COLORS.map(c=>(
              <button key={c} onClick={()=>setNewColor(c)} style={{width:20,height:20,borderRadius:'50%',background:c,border:newColor===c?`2px solid ${t.text}`:'2px solid transparent',cursor:'pointer',padding:0}}/>
            ))}
          </div>
          <button onClick={handleAdd} disabled={!newName.trim()} style={{padding:'8px 16px',background:newName.trim()?t.accent:t.border,border:'none',borderRadius:8,color:'#fff',fontSize:13,cursor:newName.trim()?'pointer':'default',fontFamily:"'Playfair Display',serif",fontWeight:600}}>Crea</button>
        </div>
      </div>
      {collections.length===0
        ?<p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'40px 0'}}>Nessuna collezione ancora. Creane una!</p>
        :<div style={{display:'flex',flexDirection:'column',gap:10}}>
          {collections.map(coll=>{
            const count=(coll.podcastIds||[]).length;
            const previews=podcasts.filter(p=>coll.podcastIds?.includes(p.id)).slice(0,4);
            return(
              <div key={coll.id} style={{background:t.bgCard,border:`1px solid ${t.borderLight}`,borderRadius:12,boxShadow:`0 1px 8px ${t.shadow}`,overflow:'hidden',borderLeft:`4px solid ${coll.color}`}}>
                <div style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',cursor:'pointer'}} onClick={()=>setActiveId(coll.id)}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:coll.color,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    {editingId===coll.id
                      ?<input value={editName} onChange={e=>setEditName(e.target.value)} onClick={e=>e.stopPropagation()}
                          onKeyDown={e=>{if(e.key==='Enter'){onRename(coll.id,editName);setEditingId(null);}if(e.key==='Escape')setEditingId(null);}}
                          onBlur={()=>{onRename(coll.id,editName);setEditingId(null);}} autoFocus
                          style={{background:'none',border:'none',borderBottom:`1px solid ${t.accent}`,color:t.text,fontSize:15,fontWeight:500,outline:'none',width:'100%'}}/>
                      :<p style={{fontSize:15,color:t.text,fontWeight:500,marginBottom:2}}>{coll.name}</p>}
                    <p style={{fontSize:12,color:t.textMuted}}>{count} podcast</p>
                  </div>
                  <div style={{display:'flex',gap:-6}}>
                    {previews.map((p,i)=><div key={p.id} style={{marginLeft:i>0?-10:0,zIndex:previews.length-i}}><CoverArt src={p.cover_url} size={32} t={t}/></div>)}
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>{setEditingId(coll.id);setEditName(coll.name);}} style={{background:'none',border:'none',color:t.textMuted,fontSize:14,cursor:'pointer',padding:'2px 6px'}}>✎</button>
                    <button onClick={()=>{if(confirm(`Eliminare "${coll.name}"?`))onRemove(coll.id);}} style={{background:'none',border:'none',color:t.textMuted,fontSize:14,cursor:'pointer',padding:'2px 6px'}}>🗑</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>}
    </div>
  );
}

function PodcastDetailView({t,podcast,player,onUpdateEpisode,onQueue,onLater,laterIds,onMarkPlayed,podcasts,onAddPodcast,onFollowPodcast,collections,onAddEpisodeToCollection}){
  const[episodes,setEpisodes]=useState(podcast.episodes||[]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState('');
  const[showAll,setShowAll]=useState(false);
  const[showFullDesc,setShowFullDesc]=useState(false);
  // La "presentazione" del podcast: molti arrivano senza description (classifiche,
  // suggerimenti) ma il feed RSS ce l'ha — la teniamo come fallback a video.
  const[feedDesc,setFeedDesc]=useState('');
  const[epQuery,setEpQuery]=useState('');
  const[sortOldest,setSortOldest]=useState(false);
  const EPISODE_LIMIT=30;
  const saved=podcasts?.find(p=>(p.feed_url&&p.feed_url===podcast.feed_url)||p.title.toLowerCase()===podcast.title.toLowerCase());
  const[addDone,setAddDone]=useState(false);
  useEffect(()=>{
    async function load(){
      let feedUrl=podcast.feed_url||saved?.feed_url;
      if(!feedUrl&&podcast.itunes_id){try{feedUrl=await fetchItunesFeedUrl(podcast.itunes_id,podcast.title);}catch(e){}}
      // Ultimo tentativo: risolvi per titolo (copre i suggerimenti di Footnote/Syllabus, che arrivano senza feed)
      if(!feedUrl&&podcast.title){try{const r=await fetchItunesSearch(podcast.title);const m=r.find(x=>x.feedUrl||x.feed_url);if(m)feedUrl=m.feed_url||m.feedUrl;}catch(e){}}
      if(!feedUrl){setLoading(false);setErr('Feed RSS non trovato. Usa "+ RSS" e incolla l\'URL manualmente (podcastindex.org).');return;}
      fetchFeed(feedUrl).then(data=>{
        if(data.description)setFeedDesc(data.description);
        // Merge con i flag utente e PERSISTENZA: prima il refresh restava solo a video
        const merged=mergeEpisodes(data.episodes,saved?.episodes||podcast.episodes||[]);
        setEpisodes(merged);setLoading(false);
        if(saved&&onUpdateEpisode)onUpdateEpisode(saved.id,merged);
      }).catch(()=>{
        const cached=(saved?.episodes&&saved.episodes.length?saved.episodes:podcast.episodes)||[];
        if(cached.length>0){setEpisodes(cached);setLoading(false);}
        else{setErr('Impossibile caricare gli episodi.');setLoading(false);}
      });
    }
    load();
  },[podcast.id]);
  async function handleAddToLibrary(){let feedUrl=podcast.feed_url;if(!feedUrl&&podcast.itunes_id){try{feedUrl=await fetchItunesFeedUrl(podcast.itunes_id,podcast.title);}catch(e){}}onAddPodcast({...podcast,feed_url:feedUrl||'',id:LS.id(),status:'wishlist',addedAt:new Date().toISOString()});setAddDone(true);}
  async function handleFollow(){let feedUrl=podcast.feed_url;if(!feedUrl&&podcast.itunes_id){try{feedUrl=await fetchItunesFeedUrl(podcast.itunes_id,podcast.title);}catch(e){}}onAddPodcast({...podcast,feed_url:feedUrl||'',id:LS.id(),status:'following',addedAt:new Date().toISOString()});setAddDone(true);}
  // Prima qui c'era un salvataggio che sovrascriveva gli episodi con la posizione
  // dell'episodio PRECEDENTE: le posizioni le gestisce già usePlayer
  function handlePlay(ep){player.play(ep,podcast);}
  // Filtro + ordinamento per ritrovare i vecchi episodi
  const visibleEpisodes=(()=>{
    let list=episodes;
    const nq=epQuery.trim().toLowerCase();
    if(nq)list=list.filter(e=>((e.title||'')+' '+(e.description||'')).toLowerCase().includes(nq));
    if(sortOldest)list=[...list].sort((a,b)=>new Date(a.published_at||0)-new Date(b.published_at||0));
    return list;
  })();
  return(
    <div className="fu">
      <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:20,padding:'14px 18px',background:t.bgCard,borderRadius:14,border:`1px solid ${t.borderLight}`,boxShadow:`0 2px 12px ${t.shadow}`}}>
        <CoverArt src={podcast.cover_url} size={72} t={t}/>
        <div style={{flex:1,minWidth:0}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontStyle:'italic',color:t.text,marginBottom:3}}>{podcast.title}</h2>
          <p style={{fontSize:13,color:t.textSec,marginBottom:4}}>{podcast.author}</p>
          {podcast.genre&&<div style={{marginBottom:6}}><Badge label={podcast.genre} color={t.accent} bg={t.accentBg}/>{podcast.track_count?<span style={{fontSize:11,color:t.textMuted,marginLeft:8}}>{podcast.track_count} episodi</span>:null}</div>}
          {(()=>{const desc=podcast.description||saved?.description||feedDesc;return desc?<div style={{marginBottom:10}}>
            {/* Su mobile 3 righe sono ~90 caratteri: la vecchia soglia 120 nascondeva
                il "Leggi tutto" a testi già tagliati. Anche il testo stesso è tappabile. */}
            <p onClick={()=>setShowFullDesc(s=>!s)} style={{fontSize:13,color:t.textSec,lineHeight:1.6,cursor:'pointer',...(!showFullDesc?{display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}:{})}}>{desc}</p>
            {desc.length>60&&<button onClick={()=>setShowFullDesc(s=>!s)} style={{background:'none',border:'none',color:t.accent,fontSize:13,cursor:'pointer',padding:'6px 0',fontStyle:'italic'}}>{showFullDesc?'▴ Meno':'▾ Leggi tutto'}</button>}
          </div>:null;})()}
          {!saved&&!addDone&&onAddPodcast&&<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={handleFollow} style={{padding:'7px 18px',background:t.accent,border:'none',borderRadius:8,color:'#fff',fontSize:13,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:600}}>● Segui</button>
            <button onClick={handleAddToLibrary} style={{padding:'7px 18px',background:'none',border:`1px solid ${t.border}`,borderRadius:8,color:t.textSec,fontSize:13,cursor:'pointer'}}>+ Wishlist</button>
            {podcast.apple_url&&<a href={podcast.apple_url} target="_blank" style={{padding:'7px 14px',background:'none',border:`1px solid ${t.border}`,borderRadius:8,color:t.textMuted,fontSize:13,textDecoration:'none',display:'inline-flex',alignItems:'center'}}>Apple ↗</a>}
          </div>}
          {(saved||addDone)&&<div style={{display:'flex',gap:8,alignItems:'center'}}>
            <Badge label={saved?.status==='following'||addDone?'● In ascolto':'✦ In wishlist'} color={t.accent2} bg={t.accent2Bg}/>
            {saved?.status==='wishlist'&&onFollowPodcast&&<button onClick={()=>onFollowPodcast(saved)} style={{padding:'4px 12px',background:t.accent2Bg,border:`1px solid ${t.accent2}`,borderRadius:6,color:t.accent2,fontSize:12,cursor:'pointer'}}>Inizia a seguire</button>}
          </div>}
          {podcast.source?.type==='buddy'&&<div style={{marginTop:8}}><Badge label={`❧ da "${podcast.source.book_title}"`} color={t.accent} bg={t.accentBg}/></div>}
        </div>
      </div>
      {loading&&<div style={{textAlign:'center',padding:'40px 0'}}><div style={{fontSize:22,color:t.accent,animation:'spin 2s linear infinite',display:'inline-block'}}>✦</div><p style={{color:t.textMuted,fontSize:14,marginTop:8}}>Carico gli episodi...</p></div>}
      {err&&<p style={{color:t.danger,fontSize:14,textAlign:'center',padding:'20px 0'}}>{err}</p>}
      {!loading&&!err&&episodes.length===0&&<p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'20px 0'}}>Nessun episodio trovato.</p>}
      {!loading&&episodes.length>5&&<div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
        <div style={{flex:1,position:'relative'}}>
          <input value={epQuery} onChange={e=>setEpQuery(e.target.value)} placeholder={`Cerca tra ${episodes.length} episodi…`}
            style={{width:'100%',padding:'8px 32px 8px 12px',background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontSize:14}}/>
          {epQuery&&<button onClick={()=>setEpQuery('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:t.textMuted,fontSize:16,cursor:'pointer',lineHeight:1}}>&#215;</button>}
        </div>
        <button onClick={()=>setSortOldest(s=>!s)} title={sortOldest?'Dai più recenti':'Dai più vecchi'}
          style={{padding:'8px 12px',background:sortOldest?t.accentBg:'none',border:`1px solid ${sortOldest?t.accent:t.border}`,borderRadius:8,color:sortOldest?t.accent:t.textSec,fontSize:12,cursor:'pointer',whiteSpace:'nowrap'}}>
          {sortOldest?'↑ Più vecchi':'↓ Più recenti'}
        </button>
      </div>}
      {epQuery&&<p style={{fontSize:12,color:t.textMuted,marginBottom:8,fontStyle:'italic'}}>{visibleEpisodes.length} {visibleEpisodes.length===1?'episodio trovato':'episodi trovati'}</p>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {(epQuery||showAll?visibleEpisodes:visibleEpisodes.slice(0,EPISODE_LIMIT)).map(ep=>{
          const isPlaying=player.episode?.id===ep.id&&player.playing;
          const isCurrent=player.episode?.id===ep.id;
          const savedPos=player.getSavedPosition?.(ep.id)||ep.position_sec||0;
          const savedPodcast=podcasts?.find(p=>(p.feed_url&&p.feed_url===podcast.feed_url)||p.title.toLowerCase()===podcast.title.toLowerCase());
          const isEpPlayed=savedPodcast?.episodes?.find(e=>e.id===ep.id)?.played||ep.played||false;
          return <EpisodeRow key={ep.id} ep={ep} t={t} isCurrent={isCurrent} isPlaying={isPlaying} savedPos={savedPos} onMarkPlayed={onMarkPlayed?(id,played)=>onMarkPlayed(podcast,id,played):null} player={player} onPlay={()=>handlePlay(ep)} onQueue={()=>onQueue&&onQueue(ep,podcast)} onLater={()=>onLater&&onLater(ep,podcast)} laterAdded={laterIds?.has(ep.id)} collections={collections} onAddToCollection={onAddEpisodeToCollection} isPlayed={isEpPlayed}/>;
        })}
        {!epQuery&&visibleEpisodes.length>EPISODE_LIMIT&&<button onClick={()=>setShowAll(s=>!s)} style={{marginTop:8,padding:'10px 0',background:'none',border:`1px solid`,borderColor:'inherit',borderRadius:10,color:'inherit',fontSize:13,cursor:'pointer',opacity:0.7,fontFamily:"'Lora',serif",fontStyle:'italic'}}>{showAll?'Mostra meno':'Mostra tutti gli episodi ('+episodes.length+')'}</button>}
      </div>
    </div>
  );
}

function QueueView({t,queue,player,onRemove,onReorder}){
  const dragIdx=useRef(null);
  const[dragOver,setDragOver]=useState(null);
  if(queue.length===0)return(
    <div className="fu" style={{textAlign:'center',padding:'60px 20px'}}>
      <p style={{fontSize:32,marginBottom:12}}>☰</p>
      <p style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontStyle:'italic',color:t.textSec,marginBottom:6}}>La coda è vuota</p>
      <p style={{color:t.textMuted,fontSize:14}}>Apri un podcast, espandi un episodio e clicca "+ Coda"</p>
    </div>
  );
  return(
    <div className="fu">
      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:t.text,fontStyle:'italic',marginBottom:16}}>{queue.length} {queue.length===1?'episodio':'episodi'} in coda</h3>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {queue.map((item,idx)=>{
          const isCurrent=player.episode?.id===item.episode.id;
          return(
            <div key={item.qid} draggable onDragStart={()=>{dragIdx.current=idx;}} onDragOver={e=>{e.preventDefault();setDragOver(idx);}} onDragLeave={()=>setDragOver(null)}
              onDrop={()=>{if(dragIdx.current!==null&&dragIdx.current!==idx)onReorder(dragIdx.current,idx);setDragOver(null);dragIdx.current=null;}} onDragEnd={()=>{setDragOver(null);dragIdx.current=null;}}
              style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:isCurrent?t.accentBg:t.bgCard,border:`2px solid ${dragOver===idx?t.accent:isCurrent?t.accent:t.borderLight}`,borderRadius:10,cursor:'grab'}}>
              <span style={{color:t.textMuted,fontSize:16,userSelect:'none',flexShrink:0}}>⠿</span>
              <span style={{fontSize:11,color:t.textMuted,flexShrink:0,width:18,textAlign:'center'}}>{idx+1}</span>
              <CoverArt src={item.podcast.cover_url} size={40} t={t}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:14,color:t.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{item.episode.title}</p>
                <p style={{fontSize:12,color:t.textSec,fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.podcast.title}{item.episode.duration_sec?` · ${formatDuration(item.episode.duration_sec)}`:''}</p>
              </div>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <button onClick={()=>player.play(item.episode,item.podcast)} style={{width:32,height:32,borderRadius:'50%',background:isCurrent?t.accent:t.bgAlt,border:`1px solid ${isCurrent?t.accent:t.border}`,color:isCurrent?'#fff':t.textSec,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{isCurrent&&player.playing?'⏸':'▶'}</button>
                <button onClick={()=>onRemove(item.qid)} style={{width:32,height:32,borderRadius:'50%',background:'none',border:`1px solid ${t.border}`,color:t.textMuted,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddPodcastModal({t,onAdd,onClose}){
  const[feedUrl,setFeedUrl]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  async function handleAdd(){
    if(!feedUrl.trim())return;setLoading(true);setErr('');
    try{const data=await fetchFeed(feedUrl.trim());onAdd({id:LS.id(),title:data.title,author:'',description:data.description,feed_url:feedUrl.trim(),cover_url:data.cover_url,source:{type:'manual'},status:'following',addedAt:new Date().toISOString(),episodes:data.episodes});onClose();}
    catch(e){setErr('Feed non valido o non raggiungibile.');}
    setLoading(false);
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:16,padding:28,width:'100%',maxWidth:480,boxShadow:`0 8px 40px ${t.shadow}`}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:t.text,marginBottom:6}}>Aggiungi podcast da RSS</h3>
        <p style={{color:t.textMuted,fontSize:14,marginBottom:18,lineHeight:1.6}}>Incolla l'URL del feed RSS. Trovalo su <a href="https://podcastindex.org" target="_blank" style={{color:t.accent}}>podcastindex.org</a>.</p>
        <input value={feedUrl} onChange={e=>setFeedUrl(e.target.value)} placeholder="https://feeds.example.com/podcast.rss" onKeyDown={e=>e.key==='Enter'&&handleAdd()} style={{width:'100%',padding:'10px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontSize:15,marginBottom:12}}/>
        {err&&<p style={{color:t.danger,fontSize:13,marginBottom:10}}>{err}</p>}
        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:10,background:'none',border:`1px solid ${t.border}`,borderRadius:8,color:t.textSec,cursor:'pointer',fontSize:14}}>Annulla</button>
          <button onClick={handleAdd} disabled={loading||!feedUrl.trim()} style={{flex:2,padding:10,background:loading?t.border:t.accent,border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:14,fontFamily:"'Playfair Display',serif",fontWeight:600}}>{loading?'Carico...':'Aggiungi podcast'}</button>
        </div>
      </div>
    </div>
  );
}

function LaterView({t,later,player,onPlay,onQueue,onRemove}){
  if(!later.length) return(
    <div style={{textAlign:'center',paddingTop:60}}>
      <p style={{fontSize:32,marginBottom:10,color:t.textMuted}}>🕐</p>
      <p style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontStyle:'italic',color:t.textSec}}>Nessun episodio salvato</p>
      <p style={{fontSize:14,color:t.textMuted,marginTop:6}}>Usa "🕐 Dopo" su qualsiasi episodio per salvarlo qui</p>
    </div>
  );
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontStyle:'italic',color:t.text}}>Da ascoltare dopo</h2>
        <span style={{fontSize:13,color:t.textMuted}}>{later.length} episodi</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {later.map(item=>{
          const ep=item.episode; const pod=item.podcast;
          const isCurrent=player.episode?.id===ep.id;
          const isPlaying=isCurrent&&player.playing;
          return(
            <div key={item.lid} style={{background:t.bgCard,border:`1px solid ${isCurrent?t.accent:t.borderLight}`,borderRadius:10,padding:'12px 14px',boxShadow:`0 1px 6px ${t.shadow}`}}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <CoverArt src={pod.cover_url} size={40} t={t}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,color:t.text,fontWeight:500,marginBottom:2,lineHeight:1.4}}>{ep.title}</p>
                  <p style={{fontSize:12,color:t.textMuted,marginBottom:8}}>{pod.title}{ep.duration_sec&&' · '+formatDuration(ep.duration_sec)}</p>
                  <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                    <button onClick={()=>onPlay(ep,pod)}
                      style={{padding:'4px 12px',background:isCurrent?t.accent:t.bgAlt,border:`1px solid ${isCurrent?t.accent:t.border}`,borderRadius:6,color:isCurrent?'#fff':t.textSec,fontSize:12,cursor:'pointer'}}>
                      {isPlaying?'⏸ In ascolto':'▶ Ascolta'}
                    </button>
                    <button onClick={()=>onQueue(ep,pod)}
                      style={{padding:'4px 12px',background:'none',border:`1px solid ${t.border}`,borderRadius:6,color:t.textSec,fontSize:12,cursor:'pointer'}}>
                      + Coda
                    </button>
                    <button onClick={()=>onRemove(item.lid)}
                      style={{padding:'4px 12px',background:'none',border:`1px solid ${t.border}`,borderRadius:6,color:t.textMuted,fontSize:12,cursor:'pointer'}}>
                      ✕ Rimuovi
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Ricerca globale: podcast, episodi in libreria, collezioni, "dopo" ────────
function SearchView({t,podcasts,collections,later,player,onQueue,onOpenPodcast}){
  const[q,setQ]=useState('');
  const needle=q.trim().toLowerCase();
  let podHits=[],epHits=[];
  if(needle.length>=2){
    podHits=podcasts.filter(p=>((p.title||'')+' '+(p.author||'')).toLowerCase().includes(needle)).slice(0,10);
    const seen=new Set();
    const pushEp=(ep,pod)=>{if(!ep||seen.has(ep.id))return;if(((ep.title||'')+' '+(ep.description||'')).toLowerCase().includes(needle)){seen.add(ep.id);epHits.push({ep,pod});}};
    podcasts.forEach(pod=>(pod.episodes||[]).forEach(ep=>pushEp(ep,pod)));
    collections.forEach(c=>(c.episodes||[]).forEach(ep=>pushEp(ep,{title:ep.podcastTitle||'',cover_url:''})));
    later.forEach(l=>pushEp(l.episode,l.podcast));
    epHits=epHits.slice(0,80);
  }
  return(
    <div className="fu">
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Cerca tra i tuoi podcast ed episodi…"
        style={{width:'100%',padding:'12px 16px',background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:16,marginBottom:18,boxShadow:`0 1px 8px ${t.shadow}`}}/>
      {needle.length<2&&<p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'30px 0'}}>
        Cerca negli episodi dei podcast che segui, nelle collezioni e in "Dopo".<br/>
        <span style={{fontSize:12}}>Suggerimento: apri un podcast e usa ↻ per indicizzare gli episodi più vecchi.</span></p>}
      {needle.length>=2&&podHits.length===0&&epHits.length===0&&
        <p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'30px 0'}}>Nessun risultato per "{q}".</p>}
      {podHits.length>0&&<div style={{marginBottom:24}}>
        <p style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:t.textMuted,marginBottom:10}}>Podcast · {podHits.length}</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {podHits.map(p=>(
            <div key={p.id} onClick={()=>onOpenPodcast(p)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:t.bgCard,border:`1px solid ${t.borderLight}`,borderRadius:10,cursor:'pointer',boxShadow:`0 1px 6px ${t.shadow}`}}>
              <CoverArt src={p.cover_url} size={40} t={t}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:14,color:t.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</p>
                <p style={{fontSize:12,color:t.textSec,fontStyle:'italic'}}>{p.author||''}{p.status==='following'?' · ● seguito':' · ✦ wishlist'}</p>
              </div>
            </div>
          ))}
        </div>
      </div>}
      {epHits.length>0&&<div>
        <p style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:t.textMuted,marginBottom:10}}>Episodi · {epHits.length}</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {epHits.map(({ep,pod})=>{
            const isCurrent=player.episode?.id===ep.id;const isPlaying=isCurrent&&player.playing;
            return(
              <div key={ep.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:isCurrent?t.accentBg:t.bgCard,border:`1px solid ${isCurrent?t.accent:t.borderLight}`,borderRadius:10,boxShadow:`0 1px 6px ${t.shadow}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,color:t.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{ep.title}</p>
                  <p style={{fontSize:12,color:t.textSec,fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pod?.title||''}{ep.published_at?` · ${formatDate(ep.published_at)}`:''}{ep.duration_sec?` · ${formatDuration(ep.duration_sec)}`:''}</p>
                </div>
                {ep.audio_url&&<button onClick={()=>player.play(ep,pod)} style={{width:32,height:32,borderRadius:'50%',flexShrink:0,background:isCurrent?t.accent:t.bgAlt,border:`1px solid ${isCurrent?t.accent:t.border}`,color:isCurrent?'#fff':t.textSec,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{isPlaying?'⏸':'▶'}</button>}
                {ep.audio_url&&onQueue&&<button onClick={()=>onQueue(ep,pod)} title="Aggiungi alla coda" style={{width:32,height:32,borderRadius:'50%',flexShrink:0,background:'none',border:`1px solid ${t.border}`,color:t.textMuted,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>}
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );
}

function App(){
  const[dark,setDark]=useState(LS.raw('ls_dark')==='1');
  const t=dark?DARK:LIGHT;
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[podcasts,setPodcasts]=useState(()=>LS.get('ls_podcasts',[]));
  const[queue,setQueue]=useState(()=>LS.get('ls_queue',[]));
  const[later,setLater]=useState(()=>LS.get('ls_later',[]));
  const[collections,setCollections]=useState(()=>LS.get('ls_collections',[]));
  const[refreshing,setRefreshing]=useState(false);
  const[view,setView]=useState('home');
  const[activePodcast,setActivePodcast]=useState(null);
  const[previousView,setPreviousView]=useState('discovery');
  const[showAdd,setShowAdd]=useState(false);
  const[showFullPlayer,setShowFullPlayer]=useState(false);
  const player=usePlayer();
  const queueRef=useRef(queue);
  useEffect(()=>{queueRef.current=queue;},[queue]);
  useEffect(()=>{document.body.style.background=t.bg;},[t]);
  useEffect(()=>{const s=document.getElementById('lsScroll')||document.createElement('style');s.id='lsScroll';s.textContent=`::-webkit-scrollbar-thumb{background:${t.border}!important}`;document.head.appendChild(s);},[t]);

  // ── Auth ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setAuthLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user??null);});
    return()=>subscription.unsubscribe();
  },[]);

  // ── Carica tutto da Supabase al login (localStorage = cache di avvio) ──
  useEffect(()=>{
    if(!user){window._lsUserId=null;return;}
    window._lsUserId=user.id; // usato da usePlayer per il sync posizioni
    (async()=>{
      try{
        const[pods,colls,qrows,positions]=await Promise.all([
          sb.from('ls_podcasts').select('*').eq('user_id',user.id).is('deleted_at',null),
          sb.from('ls_collections').select('*').eq('user_id',user.id),
          sb.from('ls_queue').select('*').eq('user_id',user.id).order('position'),
          sb.from('ls_positions').select('episode_id,position').eq('user_id',user.id),
        ]);
        if(pods.error)throw pods.error;
        // Posizioni di ascolto: server → cache locale (vince la più avanzata)
        if(positions.data?.length){
          try{
            const local=JSON.parse(localStorage.getItem('ls_positions')||'{}');
            positions.data.forEach(r=>{const sv=Number(r.position)||0;if(sv>(local[r.episode_id]||0))local[r.episode_id]=Math.floor(sv);});
            safeLsSet('ls_positions',JSON.stringify(local));
          }catch(e){}
        }
        if((pods.data||[]).length===0){
          // Primo login: migra l'eventuale libreria localStorage su Supabase
          const local=LS.get('ls_podcasts',[]);
          if(local.length>0&&window.confirm(`Trovati ${local.length} podcast locali. Importarli nel tuo account?`)){
            const rows=local.map(p=>podcastToRow(p,user.id));
            const{error}=await sb.from('ls_podcasts').upsert(rows,{onConflict:'id'});
            if(!error){
              const localColls=LS.get('ls_collections',[]);
              if(localColls.length)await sb.from('ls_collections').upsert(localColls.map(c=>({id:c.id,user_id:user.id,name:c.name,color:c.color||'#6B4E9B',podcast_ids:c.podcastIds||[],episodes:c.episodes||[]})),{onConflict:'id'});
              await syncQueueRows(LS.get('ls_queue',[]),'queue',user.id);
              await syncQueueRows(LS.get('ls_later',[]).map(l=>({episode:l.episode,podcast:l.podcast,qid:l.lid})),'later',user.id);
              return; // dati locali già a video; restano la verità
            }
          }
        }
        const mapped=(pods.data||[]).map(rowToPodcast);
        setPodcasts(mapped);LS.set('ls_podcasts',mapped);
        if(!colls.error){
          const mc=(colls.data||[]).map(c=>({id:c.id,name:c.name,color:c.color||'#6B4E9B',podcastIds:c.podcast_ids||[],episodes:c.episodes||[],createdAt:c.created_at}));
          setCollections(mc);LS.set('ls_collections',mc);
        }
        if(!qrows.error){
          const q=(qrows.data||[]).filter(r=>r.queue_type==='queue').map(r=>({episode:r.episode_data,podcast:r.podcast_data,qid:r.episode_id}));
          const l=(qrows.data||[]).filter(r=>r.queue_type==='later').map(r=>({episode:r.episode_data,podcast:r.podcast_data,lid:r.episode_id,addedAt:r.added_at}));
          setQueue(q);LS.set('ls_queue',q);
          setLater(l);LS.set('ls_later',l);
        }
        setTimeout(()=>refreshFeedsRef.current&&refreshFeedsRef.current(false),800);
      }catch(e){console.warn('[ListenS] load Supabase:',e.message||e);/* si resta sulla cache locale */}
    })();
  },[user?.id]);

  // ── Sync helper: riscrive le righe coda/dopo (liste piccole) ──────────
  async function syncQueueRows(items,type,userId){
    try{
      await sb.from('ls_queue').delete().eq('user_id',userId).eq('queue_type',type);
      if(items.length){
        const rows=items.map((it,i)=>({user_id:userId,episode_id:it.episode.id,episode_data:it.episode,podcast_data:{id:it.podcast?.id,title:it.podcast?.title||'',cover_url:it.podcast?.cover_url||''},position:i,queue_type:type}));
        await sb.from('ls_queue').upsert(rows,{onConflict:'user_id,episode_id,queue_type'});
      }
    }catch(e){console.warn('[ListenS] sync queue:',e.message||e);}
  }

  // ── Salvataggi write-through: stato + cache locale + Supabase ─────────
  function savePodcasts(p,changed){
    setPodcasts(p);LS.set('ls_podcasts',p);
    if(user&&changed){
      const toSync=(Array.isArray(changed)?changed:[changed]).map(pk=>podcastToRow(pk,user.id));
      sb.from('ls_podcasts').upsert(toSync,{onConflict:'id'}).then(({error})=>{if(error)console.warn('[ListenS] upsert podcast:',error.message);});
    }
  }
  function saveQueue(q){setQueue(q);LS.set('ls_queue',q);if(user)syncQueueRows(q,'queue',user.id);}
  function saveLater(l){setLater(l);LS.set('ls_later',l);if(user)syncQueueRows(l.map(x=>({episode:x.episode,podcast:x.podcast})),'later',user.id);}
  function saveCollections(c,removedId){
    setCollections(c);LS.set('ls_collections',c);
    if(user){
      if(removedId)sb.from('ls_collections').delete().eq('id',removedId).eq('user_id',user.id).then(()=>{});
      const rows=c.map(coll=>({id:coll.id,user_id:user.id,name:coll.name,color:coll.color||'#6B4E9B',podcast_ids:coll.podcastIds||[],episodes:coll.episodes||[]}));
      if(rows.length)sb.from('ls_collections').upsert(rows,{onConflict:'id'}).then(({error})=>{if(error)console.warn('[ListenS] upsert coll:',error.message);});
    }
  }
  function addPodcast(podcast){const exists=podcasts.find(p=>p.title.toLowerCase()===podcast.title.toLowerCase()||(p.feed_url&&p.feed_url===podcast.feed_url));if(exists)return;savePodcasts([podcast,...podcasts],podcast);}
  function removePodcast(id){
    savePodcasts(podcasts.filter(p=>p.id!==id));
    if(user)sb.from('ls_podcasts').update({deleted_at:new Date().toISOString()}).eq('id',id).eq('user_id',user.id).then(()=>{});
  }
  function followPodcast(podcast){const upd={...podcast,status:'following'};savePodcasts(podcasts.map(p=>p.id===podcast.id?upd:p),upd);}
  function updateEpisodes(podcastId,episodes){
    const target=podcasts.find(p=>p.id===podcastId);
    if(!target)return;
    const upd={...target,episodes};
    savePodcasts(podcasts.map(p=>p.id===podcastId?upd:p),upd);
  }

  // ── Refresh feed dei podcast seguiti (throttle 30 min, o manuale) ──────
  const refreshFeedsRef=useRef(null);
  async function refreshFeeds(force){
    const last=Number(LS.raw('ls_last_refresh')||0);
    if(!force&&Date.now()-last<30*60*1000)return;
    const following=podcasts.filter(p=>p.status==='following'&&p.feed_url);
    if(!following.length)return;
    setRefreshing(true);
    const results=await Promise.allSettled(following.map(async p=>({p,data:await fetchFeed(p.feed_url)})));
    let updated=[...podcasts];const changed=[];
    for(const r of results){
      if(r.status!=='fulfilled'||!r.value.data?.episodes?.length)continue;
      const{p,data}=r.value;
      const merged=mergeEpisodes(data.episodes,p.episodes||[]);
      const upd={...p,episodes:merged,cover_url:p.cover_url||data.cover_url};
      updated=updated.map(x=>x.id===p.id?upd:x);
      changed.push(upd);
    }
    if(changed.length)savePodcasts(updated,changed);
    LS.setRaw('ls_last_refresh',String(Date.now()));
    setRefreshing(false);
  }
  refreshFeedsRef.current=refreshFeeds;
  function addToQueue(episode,podcast){if(queue.find(q=>q.episode.id===episode.id))return;saveQueue([...queue,{episode,podcast,qid:LS.id()}]);}
  function removeFromQueue(qid){saveQueue(queue.filter(q=>q.qid!==qid));}
  function reorderQueue(from,to){const q=[...queue];const[item]=q.splice(from,1);q.splice(to,0,item);saveQueue(q);}
  function addToLater(episode,podcast){if(later.find(l=>l.episode.id===episode.id))return;saveLater([{episode,podcast,lid:LS.id(),addedAt:new Date().toISOString()},...later]);}
  function removeFromLater(lid){saveLater(later.filter(l=>l.lid!==lid));}
  const laterIds=new Set(later.map(l=>l.episode.id));

  // ── Esporta tutti i dati localStorage (backup per migrazione Supabase) ──
  function exportJSON(){
    const data={};
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&(k.startsWith('ls_')||k.startsWith('cp_')))keys.push(k);
    }
    keys.forEach(k=>{
      const v=localStorage.getItem(k);
      try{data[k]=JSON.parse(v);}catch{data[k]=v;}
    });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='listens-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  // Auto-play + badge Ascoltato
  useEffect(()=>{
    player.onEndedRef.current=(finishedEp, finishedPodcast)=>{
      if(!finishedEp)return;
      syncCpListen(finishedEp, finishedPodcast,
        'done', 'listened',
        { duration_min: finishedEp.duration_sec ? Math.round(finishedEp.duration_sec/60) : null, progress_pct: 100 }
      );
      setPodcasts(prev=>{
        const updated=prev.map(p=>({...p,episodes:(p.episodes||[]).map(e=>e.id===finishedEp.id?{...e,played:true}:e)}));
        LS.set('ls_podcasts',updated);
        // Sync su Supabase del podcast che contiene l'episodio concluso
        if(window._lsUserId){
          const owner=updated.find(p=>(p.episodes||[]).some(e=>e.id===finishedEp.id));
          if(owner)sb.from('ls_podcasts').upsert([podcastToRow(owner,window._lsUserId)],{onConflict:'id'}).then(()=>{});
        }
        return updated;
      });
      setQueue(prevQueue=>{
        const idx=prevQueue.findIndex(q=>q.episode.id===finishedEp.id);
        if(idx>=0){
          const newQueue=prevQueue.filter((_,i)=>i!==idx);
          LS.set('ls_queue',newQueue);
          const next=prevQueue[idx+1];
          // use playFnRef so the reference is always current even in stale closure
          if(next)setTimeout(()=>player.playFnRef.current(next.episode,next.podcast),100);
          return newQueue;
        }
        return prevQueue;
      });
    };
    // Android Auto / Media Session: nexttrack plays next in queue
    if('mediaSession' in navigator){
      navigator.mediaSession.setActionHandler('nexttrack',()=>{
        const q=queueRef.current;
        if(!q.length)return;
        const curId=player.currentRef.current?.episode?.id; // always-current ref
        const idx=q.findIndex(i=>i.episode.id===curId);
        const next=idx>=0?q[idx+1]:q[0];
        if(next)player.playFnRef.current(next.episode,next.podcast);
      });
      navigator.mediaSession.setActionHandler('previoustrack',()=>{
        player.seek(0);
      });
    }
  },[]);// eslint-disable-line
  function addCollection(name,color){saveCollections([...collections,{id:LS.id(),name,color:color||'#6B4E9B',podcastIds:[],createdAt:new Date().toISOString()}]);}
  function removeCollection(id){saveCollections(collections.filter(c=>c.id!==id),id);}
  function renameCollection(id,name){saveCollections(collections.map(c=>c.id===id?{...c,name}:c));}
  function togglePodcastInCollection(collId,podId){
    saveCollections(collections.map(c=>{
      if(c.id!==collId)return c;
      const ids=c.podcastIds||[];
      return{...c,podcastIds:ids.includes(podId)?ids.filter(i=>i!==podId):[...ids,podId]};
    }));
  }
  function addEpisodeToCollection(collId,ep,podcastTitle){
    saveCollections(collections.map(c=>{
      if(c.id!==collId)return c;
      const eps=c.episodes||[];
      if(eps.find(e=>e.id===ep.id))return c;
      return{...c,episodes:[...eps,{...ep,podcastTitle:podcastTitle||''}]};
    }));
  }
  function removeEpisodeFromCollection(collId,epId){
    saveCollections(collections.map(c=>c.id!==collId?c:{...c,episodes:(c.episodes||[]).filter(e=>e.id!==epId)}));
  }
  function markEpisodePlayed(podcast,episodeId,played){
    const changed=[];
    const next=podcasts.map(p=>{
      if((p.feed_url&&p.feed_url===podcast.feed_url)||p.id===podcast.id){
        const upd={...p,episodes:(p.episodes||[]).map(e=>e.id===episodeId?{...e,played}:e)};
        changed.push(upd);return upd;
      }
      return p;
    });
    savePodcasts(next,changed);
    // auto-remove from queue when marked as played
    if(played){
      const newQueue=queue.filter(q=>q.episode.id!==episodeId);
      if(newQueue.length!==queue.length) saveQueue(newQueue);
    }
  }
  function openPodcast(podcast,from){setPreviousView(from||view);setActivePodcast(podcast);setView('detail');}
  const navItems=[
    {id:'home',label:'Home',icon:'◉'},
    {id:'discovery',label:'Discovery',icon:'✦'},
    {id:'mypodcasts',label:'I miei podcast',icon:'●'},
    {id:'search',label:'Cerca',icon:'⌕'},
    {id:'collections',label:'Collezioni',icon:'◈'},
    {id:'queue',label:'Coda',icon:'☰',badge:queue.length||null},
    {id:'later',label:'Dopo',icon:'🕐',badge:later.length||null},
  ];
  if(authLoading)return <div style={{minHeight:'100vh',background:t.bg,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:t.textMuted,fontStyle:'italic',fontSize:15}}>Caricamento...</span></div>;
  if(!user)return <AuthScreen t={t}/>;
  return(
    <div style={{minHeight:'100vh',background:t.bg,color:t.text,paddingBottom:player.episode?130:0}}>
      <header style={{background:t.bgCard,borderBottom:`1px solid ${t.border}`,padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:200,boxShadow:`0 2px 14px ${t.shadow}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>{setView('discovery');setActivePodcast(null);}}>
          <span style={{fontSize:18,color:t.accent}}>🎙</span>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:t.text}}>ListenS</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {view==='detail'&&<button onClick={()=>{setView(previousView);setActivePodcast(null);}}
            title={previousView==='discovery'?'Discovery':previousView==='collections'?'Collezioni':'I miei podcast'}
            style={{width:30,height:30,background:'none',border:`1px solid ${t.border}`,borderRadius:7,color:t.textSec,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            ←
          </button>}
          <button onClick={()=>refreshFeeds(true)} disabled={refreshing} title="Aggiorna i feed dei podcast seguiti"
            style={{width:30,height:30,background:'none',border:`1px solid ${t.border}`,borderRadius:7,color:refreshing?t.accent:t.textSec,fontSize:15,cursor:refreshing?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={refreshing?{display:'inline-block',animation:'spin 1.2s linear infinite'}:{}}>↻</span>
          </button>
          <button onClick={()=>setShowAdd(true)} style={{padding:'5px 11px',background:t.accent,border:'none',borderRadius:7,color:'#fff',fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif"}}>+ RSS</button>
          <button onClick={exportJSON} title="Esporta dati localStorage (backup JSON)" style={{width:34,height:34,background:t.bgAlt,border:`1px solid ${t.border}`,borderRadius:7,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:t.textSec}}>{'\u2B07\uFE0E'}</button>
          <button onClick={()=>{const v=!dark;setDark(v);LS.setRaw('ls_dark',v?'1':'0');}} title={dark?'Modalità chiara':'Modalità scura'} style={{width:34,height:34,background:t.bgAlt,border:`1px solid ${t.border}`,borderRadius:7,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:t.text}}>{dark?'\u2600\uFE0E':'\u263E\uFE0E'}</button>
          <button onClick={()=>{if(confirm('Disconnettersi?'))sb.auth.signOut();}} title={user?.email} style={{padding:'0 10px',height:34,background:t.bgAlt,border:`1px solid ${t.border}`,borderRadius:7,fontSize:11,cursor:'pointer',color:t.textMuted,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.email?.split('@')[0]} ↩</button>
        </div>
      </header>
      {view!=='detail'&&<div className="nav-tabs" style={{background:t.bgCard,borderBottom:`1px solid ${t.border}`,padding:'0 8px',display:'flex'}}>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>{setView(n.id);setActivePodcast(null);}}
            style={{padding:'12px 14px',background:'none',border:'none',position:'relative',borderBottom:`2px solid ${view===n.id?t.accent:'transparent'}`,color:view===n.id?t.accent:t.textSec,fontSize:13,cursor:'pointer',fontFamily:"'Playfair Display',serif",transition:'all .15s',whiteSpace:'nowrap'}}>
            {n.icon} {n.label}
            {n.badge?<span style={{position:'absolute',top:8,right:2,background:t.accent,color:'#fff',borderRadius:10,fontSize:9,padding:'1px 5px'}}>{n.badge}</span>:null}
          </button>
        ))}
      </div>}
      <main style={{maxWidth:780,margin:'0 auto',padding:'22px 16px'}}>
        {view==='home'&&<HomeView t={t} podcasts={podcasts} player={player} onPlay={(ep,pod)=>player.play(ep,pod)} onQueue={addToQueue} onLater={addToLater} laterIds={laterIds} collections={collections} onAddToCollection={addEpisodeToCollection} onMarkPlayed={markEpisodePlayed} onOpenPodcast={p=>openPodcast(p,'home')}/>}
        {view==='discovery'&&<DiscoveryView key="discovery" t={t} onAddPodcast={addPodcast} onOpenPodcast={p=>openPodcast(p,'discovery')}/>}
        {view==='mypodcasts'&&<MyPodcastsView t={t} podcasts={podcasts} collections={collections} onSelect={p=>openPodcast(p,'mypodcasts')} onRemove={removePodcast} onFollow={followPodcast} onToggleCollection={togglePodcastInCollection}/>}
        {view==='collections'&&<CollectionsView t={t} collections={collections} podcasts={podcasts} onAdd={addCollection} onRemove={removeCollection} onRename={renameCollection} onOpenPodcast={p=>openPodcast(p,'collections')} onToggle={togglePodcastInCollection} onRemoveEpisode={removeEpisodeFromCollection} player={player}/>}
        {view==='detail'&&activePodcast&&<PodcastDetailView t={t} podcast={activePodcast} player={player} onUpdateEpisode={updateEpisodes} onQueue={addToQueue} onLater={addToLater} laterIds={laterIds} onMarkPlayed={markEpisodePlayed} podcasts={podcasts} onAddPodcast={addPodcast} onFollowPodcast={followPodcast} collections={collections} onAddEpisodeToCollection={(collId,ep)=>addEpisodeToCollection(collId,ep,activePodcast.title)}/>}
        {view==='queue'&&<QueueView t={t} queue={queue} player={player} onRemove={removeFromQueue} onReorder={reorderQueue}/>}
        {view==='later'&&<LaterView t={t} later={later} player={player} onPlay={(ep,pod)=>player.play(ep,pod)} onQueue={addToQueue} onRemove={removeFromLater}/>}
        {view==='search'&&<SearchView t={t} podcasts={podcasts} collections={collections} later={later} player={player} onQueue={addToQueue} onOpenPodcast={p=>openPodcast(p,'search')}/>}
      </main>
      <PlayerBar player={player} t={t} onExpand={()=>setShowFullPlayer(true)}/>
      {showFullPlayer&&<FullPlayerSheet player={player} t={t} onClose={()=>setShowFullPlayer(false)}/>}
      {showAdd&&<AddPodcastModal t={t} onAdd={addPodcast} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: {
          minHeight:'100vh', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          background:'#0f0e0b', color:'#e8e0d4',
          fontFamily:'Georgia,serif', padding:'2rem', textAlign:'center', gap:'1rem'
        }
      },
        React.createElement('div', { style:{fontSize:'2.5rem'} }, '\u26a0\ufe0f'),
        React.createElement('h2', { style:{color:'#c8903a',margin:0} }, 'Qualcosa \u00e8 andato storto'),
        React.createElement('p', { style:{color:'#7a6e64',fontSize:'0.9rem',maxWidth:'480px'} },
          this.state.error?.message || 'Errore sconosciuto'),
        React.createElement('button', {
          onClick: () => this.setState({ hasError: false, error: null }),
          style: {
            marginTop:'1rem', padding:'0.6rem 1.4rem',
            background:'transparent', color:'#c8903a',
            border:'1px solid #c8903a', borderRadius:'4px',
            cursor:'pointer', fontFamily:'Georgia,serif', fontSize:'0.9rem'
          }
        }, 'Riprova')
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App, null)));
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
