// Rete di sicurezza: mostra a schermo qualsiasi errore di caricamento/parse
// invece di lasciare una pagina bianca muta (es. CDN giù, errore di sintassi).
(function(){
  var shown=false;
  function overlay(title,detail){
    if(shown)return; shown=true;
    var d=document.createElement('div');
    d.style.cssText='position:fixed;inset:0;background:#141018;color:#EDE8F8;font-family:Georgia,serif;padding:2rem;overflow:auto;z-index:99999;line-height:1.5';
    d.innerHTML='<div style="font-size:2rem">⚠️</div>'+
      '<h2 style="color:#9B7EC8;margin:.4rem 0">ListenS — errore di caricamento</h2>'+
      '<p style="color:#B8AECF">'+String(title||'')+'</p>'+
      '<pre style="font-size:12px;white-space:pre-wrap;color:#7A6E8E;margin-top:1rem">'+String(detail||'')+'</pre>'+
      '<button onclick="location.reload()" style="margin-top:1.4rem;padding:.6rem 1.4rem;background:transparent;color:#9B7EC8;border:1px solid #9B7EC8;border-radius:6px;cursor:pointer;font-family:Georgia,serif">Ricarica</button>';
    (document.body||document.documentElement).appendChild(d);
  }
  window.addEventListener('error',function(e){
    overlay(e.message||'Errore JavaScript',(e.filename||'')+(e.lineno?(' :'+e.lineno):'')+'\n'+((e.error&&e.error.stack)||''));
  });
  window.addEventListener('unhandledrejection',function(e){
    overlay('Promise non gestita',(e.reason&&(e.reason.stack||e.reason.message))||String(e.reason||''));
  });
})();
</script>

// ID episodio DETERMINISTICO (hash dell'audio_url): prima gli episodi senza guid
// ricevevano un id casuale a ogni caricamento → posizioni e "ascoltato" orfani
function stableEpId(s){let h=5381;s=String(s||'');for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}return 'e'+(h>>>0).toString(36);}

// Merge episodi: feed fresco + flag utente (played/posizione) dal salvato.
// Matching per id e, in subordine, per audio_url (sopravvive ai cambi di guid)
function mergeEpisodes(fresh, old){
  const byId=new Map((old||[]).map(e=>[e.id,e]));
  const byUrl=new Map((old||[]).filter(e=>e.audio_url).map(e=>[e.audio_url,e]));
  return (fresh||[]).map(e=>{
    const o=byId.get(e.id)||byUrl.get(e.audio_url);
    return o?{...e,played:o.played||false,position_sec:o.position_sec||0}:e;
  });
}

async function fetchFeed(feedUrl){
  async function viaRss2json(u){
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}`);
    const d=await r.json();
    if(d.status!=='ok')throw new Error('rss2json: '+d.message);
    const items=(d.items||[]).filter(i=>i.enclosure?.link||i.link).map(i=>({
      id:stableEpId(i.enclosure?.link||i.guid||i.title),title:i.title||'',
      description:stripHtml(i.description||i.content||''),
      audio_url:i.enclosure?.link||'',
      duration_sec:parseDuration(i.itunes_duration||''),
      published_at:i.pubDate||'',played:false,position_sec:0
    })).filter(e=>e.audio_url);
    return{title:d.feed?.title||'',description:stripHtml(d.feed?.description||''),cover_url:d.feed?.image||'',episodes:items,_source:'rss2json'};
  }
  const proxies=[
    // Proxy server-side su stesso dominio — nessun CORS, affidabilissimo
    async(u)=>{const r=await fetch('/api/feed?url='+encodeURIComponent(u));if(!r.ok)throw new Error('api/feed '+r.status);const txt=await r.text();if(txt.length<200)throw new Error('empty');return txt;},
    // Fallback CORS proxy di terze parti
    async(u)=>{const r=await fetch('https://corsproxy.io/?url='+encodeURIComponent(u));if(!r.ok)throw new Error('http '+r.status);const txt=await r.text();if(txt.length<200)throw new Error('empty');return txt;},
    async(u)=>{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(u));const j=await r.json();if(!j.contents||j.contents.length<200)throw new Error('empty');return j.contents;},
    async(u)=>{const r=await fetch('https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u));if(!r.ok)throw new Error('http '+r.status);const txt=await r.text();if(txt.length<200)throw new Error('empty');return txt;},
  ];
  const wt=(p,ms)=>Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);
  function parseXmlFeed(txt){
    if(!txt.includes('<rss')&&!txt.includes('<feed')&&!txt.includes('<channel'))throw new Error('not rss');
    const parsed=new DOMParser().parseFromString(txt,'text/xml');
    const channel=parsed.querySelector('channel');
    if(!channel&&!parsed.querySelector('feed'))throw new Error('no channel');
    const items=[...parsed.querySelectorAll('item')].map(item=>{
      const enc=item.querySelector('enclosure');
      return{id:stableEpId(enc?.getAttribute('url')||item.querySelector('guid')?.textContent||item.querySelector('title')?.textContent),
        title:item.querySelector('title')?.textContent?.trim()||'',
        description:stripHtml(item.querySelector('description')?.textContent||''),
        audio_url:enc?.getAttribute('url')||'',
        duration_sec:parseDuration(item.querySelector('duration')?.textContent||''),
        published_at:item.querySelector('pubDate')?.textContent||'',
        played:false,position_sec:0};
    }).filter(e=>e.audio_url);
    return{title:channel?.querySelector('title')?.textContent?.trim()||'',
      description:stripHtml(channel?.querySelector('description')?.textContent||''),
      cover_url:channel?.querySelector('image url')?.textContent||parsed.querySelector('image')?.getAttribute('href')||'',
      episodes:items};
  }
  // Lancia rss2json e tutti i proxy in parallelo — restituisce il risultato con più episodi
  const attempts=await Promise.allSettled([
    wt(viaRss2json(feedUrl),9000),
    ...proxies.map(p=>wt((async()=>parseXmlFeed(await p(feedUrl)))(),9000))
  ]);
  let best=null;
  for(const r of attempts){
    if(r.status==='fulfilled'&&r.value?.episodes?.length>0){
      if(!best||r.value.episodes.length>best.episodes.length)best=r.value;
    }
  }
  if(best)return best;
  throw new Error('Impossibile caricare il feed');
}

async function findFeedUrl(itunesId,title){
  // 1) iTunes lookup diretto per id
  try{const r=await fetch(`https://itunes.apple.com/lookup?id=${itunesId}&entity=podcast`);const d=await r.json();if(d.results?.[0]?.feedUrl)return d.results[0].feedUrl;}catch(e){}
  // 2) iTunes search per titolo — restituisce feedUrl anche per Acast
  if(title){try{const q=encodeURIComponent(title);const r=await fetch(`https://itunes.apple.com/search?term=${q}&media=podcast&limit=5`);const d=await r.json();const match=d.results?.find(x=>x.feedUrl&&(String(x.collectionId)===String(itunesId)||x.collectionName?.toLowerCase()===title.toLowerCase()));if(match?.feedUrl)return match.feedUrl;if(d.results?.[0]?.feedUrl)return d.results[0].feedUrl;}catch(e){}}
  // 3) rss2json come resolver — cerca feed tramite titolo
  if(title){try{const q=encodeURIComponent(title);const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://feeds.acast.com/${q}&api_key=`);const d=await r.json();if(d.feed?.url)return d.feed.url;}catch(e){}}
  return '';
}
async function fetchItunesFeedUrl(id,title){return findFeedUrl(id,title||'');}
function parseDuration(str){if(!str)return null;const p=str.split(':').map(Number);if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];return parseInt(str)||null;}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent?.replace(/\s+/g,' ').trim()||'';}
function formatDuration(sec){if(!sec)return '';const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h>0?`${h}h ${m}m`:`${m}m ${String(s).padStart(2,'0')}s`;}
function formatDate(str){if(!str)return '';try{return new Date(str).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});}catch{return '';}}
async function fetchItunesTop(genreId,country='us'){
  const res=await fetch(`https://itunes.apple.com/${country}/rss/toppodcasts/limit=20/genre=${genreId}/json`);
  const data=await res.json();

}

// il vecchio rss.itunes resta per i generi, che il v2 non supporta.
// ⚠️ marketingtools NON manda Access-Control-Allow-Origin (verificato 2026-07-18):
// dal browser va SEMPRE passato dal nostro proxy /api/feed, mai fetch diretto.
async function fetchAppleTopV2(country='us'){
  const res=await fetch('/api/feed?url='+encodeURIComponent(`https://rss.marketingtools.apple.com/api/v2/${country}/podcasts/top/30/podcasts.json`));
  const data=JSON.parse(await res.text());
  return(data.feed?.results||[]).map(e=>({itunes_id:String(e.id||''),title:e.name||'',author:e.artistName||'',cover_url:(e.artworkUrl100||'').replace('100x100','600x600'),feed_url:'',genre:e.genres?.[0]?.name||'',track_count:null,release_date:'',description:'',apple_url:e.url||'',source:{type:'discovery'}}));
}
async function fetchItunesSearch(query,country='us'){
  const res=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=podcast&limit=15&country=${country}`);
  const data=await res.json();
  return(data.results||[]).map(e=>({itunes_id:String(e.collectionId||''),title:e.collectionName||e.trackName||'',author:e.artistName||'',cover_url:e.artworkUrl600||e.artworkUrl100||'',feed_url:e.feedUrl||'',genre:e.primaryGenreName||'',track_count:e.trackCount||null,release_date:e.releaseDate||'',description:e.shortDescription||e.description||'',apple_url:e.collectionViewUrl||'',source:{type:'search'}}));

// ── Commonplace data layer — SUL SUPABASE UNIFICATO (pchld) ───────────────
// Prima scriveva su localStorage: isola invisibile alle altre app
function syncCpListen(episode, podcast, status, eventType, meta={}) {
  try {
    const uid = window._lsUserId;
    if (!uid) return; // serve il login (c'è sempre, l'app è dietro auth)
    const cpId = 'ls_' + episode.id;
    const now  = new Date().toISOString();
    sb.from('cp_items').upsert({
      id: cpId, user_id: uid, source_app: 'listens', source_id: episode.id,
      type: 'podcast_episode', title: episode.title || '',
      creator: podcast?.title || '', status,
      cover_url: podcast?.cover_url || null,
      metadata: { duration_sec: episode.duration_sec || null, published_at: episode.published_at || null },
      updated_at: now,
    }, { onConflict: 'id' }).then(({error})=>{ if(error) console.warn('[cp] items:', error.message); });
    if (eventType) {
      sb.from('cp_log').upsert({
        id: 'ls_ev_' + episode.id + '_' + eventType, user_id: uid,
        item_id: cpId, source_app: 'listens', event_type: eventType,
        event_at: now, metadata: meta,
      }, { onConflict: 'id' }).then(({error})=>{ if(error) console.warn('[cp] log:', error.message); });
    }
  } catch(e) { console.warn('[cp] listens sync error', e); }
}

function usePlayer(){
  const audioRef=useRef(null);const saveTimer=useRef(null);
  const onEndedRef=useRef(null);
  const currentRef=useRef({episode:null,podcast:null});
  const sleepTimerRef=useRef(null);
  const playFnRef=useRef(null); // always-current play reference for autoplay
  const stallTimerRef=useRef(null);
  const[state,setState]=useState(()=>{
    try{
      const last=JSON.parse(localStorage.getItem('ls_last_played')||'null');
      if(last?.episode&&last?.podcast){
        const pos=JSON.parse(localStorage.getItem('ls_positions')||'{}')[last.episode.id]||0;
        return{episode:last.episode,podcast:last.podcast,playing:false,position:pos,duration:last.episode.duration_sec||0,speed:1,sleepMinsLeft:0};
      }
    }catch(e){}
    return{episode:null,podcast:null,playing:false,position:0,duration:0,speed:1,sleepMinsLeft:0};
  });
  const posSyncRef=useRef({});
  function pushPositionToSb(id,pos){
    const uid=window._lsUserId;
    if(!uid)return;
    posSyncRef.current[id]=Date.now();
    // Niente errori inghiottiti: un fallimento qui era invisibile per design (male)
    sb.from('ls_positions').upsert({user_id:uid,episode_id:id,position:Math.floor(pos),updated_at:new Date().toISOString()},{onConflict:'user_id,episode_id'}).then(({error})=>{if(error)console.warn('[ls] sync posizione fallito:',error.message);});
  }
  function savePosition(id,pos,flush){
    if(!id||pos<3)return;
    try{const s=JSON.parse(localStorage.getItem('ls_positions')||'{}');s[id]=Math.floor(pos);safeLsSet('ls_positions',JSON.stringify(s));}catch(e){}
    // Sync su Supabase ogni 30s al massimo per episodio (resume cross-device).
    // flush=true (pausa/app in background/chiusura) scavalca il throttle: in auto
    // o correndo l'app viene uccisa senza preavviso — l'ultima posizione deve
    // essere GIÀ sul server, non "entro 30 secondi".
    if(flush||Date.now()-(posSyncRef.current[id]||0)>30000)pushPositionToSb(id,pos);
  }
  // Azzera davvero la posizione (fine episodio): savePosition(id,0) era un no-op
  // per la guardia pos<3, e l'episodio finito sarebbe ripreso dalla coda.
  function resetPosition(id){
    if(!id)return;
    try{const s=JSON.parse(localStorage.getItem('ls_positions')||'{}');delete s[id];safeLsSet('ls_positions',JSON.stringify(s));}catch(e){}
    pushPositionToSb(id,0);
  }
  function getSavedPosition(id){try{return JSON.parse(localStorage.getItem('ls_positions')||'{}')[id]||0;}catch(e){return 0;}}
  useEffect(()=>{
    const audio=new Audio();audio.preload='auto';audioRef.current=audio;
    audio.addEventListener('timeupdate',()=>{
      setState(s=>({...s,position:audio.currentTime,duration:audio.duration||0}));
      if('mediaSession' in navigator&&audio.duration>0){
        try{navigator.mediaSession.setPositionState({duration:audio.duration,playbackRate:audio.playbackRate,position:audio.currentTime});}catch(e){}
      }
    });
    audio.addEventListener('ended',()=>{
      const ep=currentRef.current.episode;
      if(ep)resetPosition(ep.id);
      setState(s=>({...s,playing:false,position:0}));
      if('mediaSession' in navigator)navigator.mediaSession.playbackState='none';
      if(onEndedRef.current)onEndedRef.current(currentRef.current.episode,currentRef.current.podcast);
    });
    audio.addEventListener('stalled',()=>{
      stallTimerRef.current=setTimeout(()=>{
        if(!audio.paused&&audio.readyState<3){
          const t=audio.currentTime;
          audio.src=audio.src;
          audio.currentTime=t;
          audio.play().catch(()=>{});
        }
      },2000);
    });
    audio.addEventListener('playing',()=>{
      if(stallTimerRef.current){clearTimeout(stallTimerRef.current);stallTimerRef.current=null;}
    });
    // Flush posizione nei momenti in cui l'app può sparire da un momento all'altro
    // (uso in auto/corsa): pausa, passaggio in background, chiusura pagina.
    const flushPos=()=>{const ep=currentRef.current.episode;const a=audioRef.current;if(ep&&a&&a.currentTime>3&&!a.ended)savePosition(ep.id,a.currentTime,true);};
    const onHidden=()=>{if(document.visibilityState==='hidden')flushPos();};
    audio.addEventListener('pause',flushPos);
    window.addEventListener('pagehide',flushPos);
    document.addEventListener('visibilitychange',onHidden);
    audio.addEventListener('error',()=>{
      if(stallTimerRef.current){clearTimeout(stallTimerRef.current);stallTimerRef.current=null;}
      setState(s=>({...s,playing:false}));
    });
    if('mediaSession' in navigator){
      navigator.mediaSession.setActionHandler('play',()=>{audio.play().catch(e=>{if(e.name!=='AbortError')setState(s=>({...s,playing:false}));});setState(s=>({...s,playing:true}));navigator.mediaSession.playbackState='playing';});
      navigator.mediaSession.setActionHandler('pause',()=>{audio.pause();setState(s=>({...s,playing:false}));navigator.mediaSession.playbackState='paused';});
      navigator.mediaSession.setActionHandler('seekbackward',({seekOffset})=>{const t=Math.max(0,audio.currentTime-(seekOffset||30));audio.currentTime=t;setState(s=>({...s,position:t}));});
      navigator.mediaSession.setActionHandler('seekforward',({seekOffset})=>{const t=Math.min(audio.duration||0,audio.currentTime+(seekOffset||30));audio.currentTime=t;setState(s=>({...s,position:t}));});
      navigator.mediaSession.setActionHandler('stop',()=>{audio.pause();audio.currentTime=0;setState(s=>({...s,playing:false,position:0}));navigator.mediaSession.playbackState='none';});
      navigator.mediaSession.setActionHandler('seekto',({seekTime})=>{if(seekTime!=null){audio.currentTime=seekTime;setState(s=>({...s,position:seekTime}));}});
      // Volante/schermo auto (AVRCP via Bluetooth) mandano prev/next TRACK, non
      // seek: senza questi handler i pulsanti ⏮⏭ in macchina non facevano NULLA.
      // Convenzione podcast: ⏮ = -15s, ⏭ = +30s.
      try{
        navigator.mediaSession.setActionHandler('previoustrack',()=>{const t=Math.max(0,audio.currentTime-15);audio.currentTime=t;setState(s=>({...s,position:t}));});
        navigator.mediaSession.setActionHandler('nexttrack',()=>{const t=Math.min(audio.duration||0,audio.currentTime+30);audio.currentTime=t;setState(s=>({...s,position:t}));});
      }catch(e){}
    }
    return()=>{audio.pause();clearInterval(saveTimer.current);clearInterval(sleepTimerRef.current);if(stallTimerRef.current)clearTimeout(stallTimerRef.current);window.removeEventListener('pagehide',flushPos);document.removeEventListener('visibilitychange',onHidden);};
  },[]);
  function play(episode,podcast){
    const audio=audioRef.current;
    if(currentRef.current.episode?.id===episode.id){
      if(audio.paused){audio.play().catch(e=>{if(e.name!=='AbortError')setState(s=>({...s,playing:false}));});setState(s=>({...s,playing:true}));if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';}
      else{audio.pause();setState(s=>({...s,playing:false}));if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';}
      return;
    }
    const pos=episode.position_sec>0?episode.position_sec:getSavedPosition(episode.id);
    audio.src=episode.audio_url;audio.playbackRate=state.speed;
    if(pos>0)audio.currentTime=pos;
    audio.play().catch(e=>{if(e.name!=='AbortError')setState(s=>({...s,playing:false}));});
    currentRef.current={episode,podcast};
    safeLsSet('ls_last_played',JSON.stringify({episode,podcast}));
    setState(s=>({...s,episode,podcast,playing:true,position:pos}));
    syncCpListen(episode, podcast, 'in_progress', 'started');
    if('mediaSession' in navigator){
      navigator.mediaSession.metadata=new MediaMetadata({title:episode.title||'',artist:podcast?.title||'',album:podcast?.title||'',artwork:podcast?.cover_url?[{src:podcast.cover_url,sizes:'96x96',type:'image/jpeg'},{src:podcast.cover_url,sizes:'256x256',type:'image/jpeg'},{src:podcast.cover_url,sizes:'512x512',type:'image/jpeg'}]:[]});
      navigator.mediaSession.playbackState='playing';
    }
    clearInterval(saveTimer.current);
    saveTimer.current=setInterval(()=>{if(audio.currentTime>3)savePosition(episode.id,audio.currentTime);},5000);
  }
  function seek(t){audioRef.current.currentTime=t;setState(s=>({...s,position:t}));}
  function setSpeed(spd){audioRef.current.playbackRate=spd;setState(s=>({...s,speed:spd}));}
  function skip(sec){const t=Math.max(0,Math.min(audioRef.current.duration||0,audioRef.current.currentTime+sec));seek(t);}
  function setSleepTimer(mins){
    clearInterval(sleepTimerRef.current);
    if(!mins){setState(s=>({...s,sleepMinsLeft:0}));return;}
    setState(s=>({...s,sleepMinsLeft:mins}));
    sleepTimerRef.current=setInterval(()=>{
      setState(s=>{
        const left=s.sleepMinsLeft-1;
        if(left<=0){clearInterval(sleepTimerRef.current);audioRef.current.pause();return{...s,playing:false,sleepMinsLeft:0};}
        return{...s,sleepMinsLeft:left};
      });
    },60000);
  }
  playFnRef.current=play; // keep always-current for autoplay
  return{...state,play,seek,setSpeed,skip,setSleepTimer,getSavedPosition,onEndedRef,playFnRef,currentRef};
}

            {!isCurrent&&!played&&savedPos>10&&<span style={{fontSize:11,color:t.accent,fontStyle:'italic'}}>▶ Riprendi da {formatDuration(Math.floor(savedPos))}</span>}
            <span style={{fontSize:10,color:t.textMuted,marginLeft:'auto',display:'inline-block',transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>▾</span>
          </div>
          {isCurrent&&<div style={{marginTop:6}}><ProgressBar pct={player.duration>0?(player.position/player.duration)*100:0} color={t.accent} height={3}/></div>}

          {isPlaying?'⏸':'▶'}
        </button>
      </div>
      {expanded&&<div style={{borderTop:`1px solid ${t.borderLight}`,padding:'10px 14px 12px',background:t.bgAlt}}>
        {ep.description?<p style={{fontSize:13,color:t.textSec,lineHeight:1.65,marginBottom:10,display:'-webkit-box',WebkitLineClamp:5,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{ep.description}</p>:<p style={{fontSize:13,color:t.textMuted,fontStyle:'italic',marginBottom:10}}>Nessuna descrizione disponibile.</p>}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={e=>{e.stopPropagation();if(!queued){onQueue();setQueued(true);}}}
            style={{padding:'4px 12px',background:queued?t.accent2Bg:'none',border:`1px solid ${queued?t.accent2:t.border}`,borderRadius:6,color:queued?t.accent2:t.textSec,fontSize:12,cursor:queued?'default':'pointer'}}>
            {queued?'✓ In coda':'+ Coda'}
          </button>
          {onLater&&<button onClick={e=>{e.stopPropagation();if(!laterDone){onLater();setLaterDone(true);}}}
            style={{padding:'4px 12px',background:laterDone?t.accentBg:'none',border:`1px solid ${laterDone?t.accent:t.border}`,borderRadius:6,color:laterDone?t.accent:t.textSec,fontSize:12,cursor:laterDone?'default':'pointer'}}>
            {laterDone?'🕐 Salvato':'🕐 Dopo'}
          </button>}

          {onMarkPlayed&&<button onClick={e=>{e.stopPropagation();onMarkPlayed(ep.id,!played);}}
            style={{padding:'4px 12px',background:played?t.accent2Bg:'none',border:`1px solid ${played?t.accent2:t.border}`,borderRadius:6,color:played?t.accent2:t.textSec,fontSize:12,cursor:'pointer'}}>
            {played?'✓ Ascoltato':'○ Segna ascoltato'}
          </button>}
          {onAddToCollection&&collections?.length>0&&<button onClick={e=>{e.stopPropagation();setShowCollPicker(s=>!s);}}
            style={{padding:'4px 12px',background:showCollPicker?t.accentBg:'none',border:`1px solid ${showCollPicker?t.accent:t.border}`,borderRadius:6,color:showCollPicker?t.accent:t.textSec,fontSize:12,cursor:'pointer'}}>
            ◈ Collezione
          </button>}
        </div>
        {showCollPicker&&collections?.length>0&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,color:t.textMuted}}>Aggiungi a:</span>
          {collections.map(c=><button key={c.id} onClick={e=>{e.stopPropagation();onAddToCollection(c.id,ep);setShowCollPicker(false);}}
            style={{fontSize:11,padding:'3px 10px',borderRadius:10,border:`1px solid ${c.color}`,background:'none',color:c.color,cursor:'pointer'}}>
            {c.name}
          </button>)}
        </div>}
      </div>}
    </div>
  );
}

function BuddySuggestionRow({podcast,t,onAddPodcast}){
  const[resolved,setResolved]=useState(null);
  const[loading,setLoading]=useState(false);
  const[added,setAdded]=useState(false);
  const[searched,setSearched]=useState(false);
  async function findOnItunes(){setLoading(true);setSearched(true);try{const r=await fetchItunesSearch(podcast.title);if(r.length>0)setResolved(r[0]);}catch(e){}setLoading(false);}
  async function handleAdd(){
    const target=resolved||podcast;
    let feedUrl=target.feed_url;
    if(!feedUrl&&target.itunes_id)feedUrl=await fetchItunesFeedUrl(target.itunes_id,target.title);
    onAddPodcast({...target,feed_url:feedUrl,id:LS.id(),source:{type:'buddy',book_title:podcast.source?.book_title,book_id:podcast.source?.book_id},status:'wishlist',addedAt:new Date().toISOString()});
    setAdded(true);
  }
  const display=resolved||podcast;
  return(
    <div style={{background:t.bgCard,border:`1px solid ${t.borderLight}`,borderRadius:12,boxShadow:`0 1px 8px ${t.shadow}`,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px'}}>
        <CoverArt src={display.cover_url} size={52} t={t}/>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:15,color:t.text,fontWeight:500,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{display.title}</p>
          <p style={{fontSize:13,color:t.textSec,fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{display.author||(podcast.source?.book_title?`❧ da "${podcast.source.book_title}"`:'')}</p>
          {podcast.description&&!resolved&&<p style={{fontSize:12,color:t.textMuted,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{podcast.description}</p>}
        </div>
        <div style={{flexShrink:0,display:'flex',gap:8,alignItems:'center'}}>
          {added?<span style={{fontSize:12,color:t.accent2,fontStyle:'italic'}}>✓ Aggiunto</span>
           :loading?<Dots color={t.accent}/>
           :resolved?<button onClick={handleAdd} style={{padding:'5px 12px',background:t.accent,border:'none',borderRadius:6,color:'#fff',fontSize:12,cursor:'pointer'}}>+ Aggiungi</button>
           :searched?<button onClick={handleAdd} style={{padding:'5px 12px',background:'none',border:`1px solid ${t.border}`,borderRadius:6,color:t.textSec,fontSize:12,cursor:'pointer'}}>+ Aggiungi</button>
           :<button onClick={findOnItunes} style={{padding:'5px 12px',background:t.accentBg,border:`1px solid ${t.accent}`,borderRadius:6,color:t.accent,fontSize:12,cursor:'pointer'}}>Cerca su iTunes</button>}
        </div>
      </div>
    </div>
  );
}

function HomeView({t,podcasts,player,onPlay,onQueue,onLater,laterIds,collections,onAddToCollection,onMarkPlayed,onOpenPodcast}){
  const following=podcasts.filter(p=>p.status==='following'&&p.episodes?.length);
  // Collect latest unplayed episode per podcast, sort by date
  const feedItems=[];
  following.forEach(pod=>{
    const ep=(pod.episodes||[]).find(e=>!e.played);
    if(ep)feedItems.push({ep,pod});
  });
  feedItems.sort((a,b)=>{
    const da=a.ep.published_at?new Date(a.ep.published_at):new Date(0);
    const db=b.ep.published_at?new Date(b.ep.published_at):new Date(0);
    return db-da;
  });
  const{episode:curEp,podcast:curPod,playing,position,duration}=player;
  const hasCurrent=!!curEp;
  return(
    <div>
      {hasCurrent&&<div style={{marginBottom:24}}>
        <p style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:t.textMuted,marginBottom:12}}>Continua ad ascoltare</p>
        <div style={{background:t.accentBg,border:`1px solid ${t.accent}`,borderRadius:12,padding:'14px 16px',display:'flex',gap:14,alignItems:'center'}}>
          <CoverArt src={curPod?.cover_url} size={52} t={t}/>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,color:t.text,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{curEp.title}</p>
            <p style={{fontSize:12,color:t.textMuted,marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{curPod?.title}</p>
            <ProgressBar pct={duration>0?(position/duration)*100:0} color={t.accent} height={3}/>
            <span style={{fontSize:11,color:t.textMuted}}>{formatDuration(Math.floor(position))} / {formatDuration(Math.floor(duration||curEp.duration_sec||0))}</span>
          </div>
          <button onClick={()=>player.play(curEp,curPod)} style={{width:40,height:40,borderRadius:'50%',background:t.accent,border:'none',color:'#fff',fontSize:18,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {playing?'⏸':'▶'}
          </button>
        </div>
      </div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <p style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:t.textMuted}}>Nuovi episodi</p>
        <span style={{fontSize:11,color:t.textMuted}}>{feedItems.length} episodi</span>
      </div>
      {feedItems.length===0&&<p style={{color:t.textMuted,fontSize:14,fontStyle:'italic',textAlign:'center',padding:'40px 0'}}>
        {following.length===0?'Aggiungi podcast da seguire per vedere i nuovi episodi qui.':'Caricamento episodi... Apri un podcast per aggiornarlo.'}
      </p>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {feedItems.map(({ep,pod})=>{
          const isCurrent=player.episode?.id===ep.id;
          const isPlaying=isCurrent&&player.playing;
          const savedPos=player.getSavedPosition?.(ep.id)||0;
          return(
            <div key={ep.id} style={{background:isCurrent?t.accentBg:t.bgCard,border:`1px solid ${isCurrent?t.accent:t.borderLight}`,borderRadius:10,padding:'10px 14px',display:'flex',gap:12,alignItems:'center',boxShadow:`0 1px 4px ${t.shadow}`}}>
              <div style={{cursor:'pointer'}} onClick={()=>onOpenPodcast&&onOpenPodcast(pod)}>
                <CoverArt src={pod.cover_url} size={40} t={t}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:13,color:t.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{ep.title}</p>
                <p style={{fontSize:11,color:t.textMuted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pod.title}{ep.published_at?` · ${formatDate(ep.published_at)}`:''}{ep.duration_sec?` · ${formatDuration(ep.duration_sec)}`:''}</p>
                {savedPos>10&&!isCurrent&&<span style={{fontSize:11,color:t.accent,fontStyle:'italic'}}>▶ Riprendi da {formatDuration(Math.floor(savedPos))}</span>}
              </div>
              <button onClick={()=>onPlay(ep,pod)} style={{width:34,height:34,borderRadius:'50%',flexShrink:0,background:isCurrent?t.accent:t.bgAlt,border:`1px solid ${isCurrent?t.accent:t.border}`,color:isCurrent?'#fff':t.textSec,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {isPlaying?'⏸':'▶'}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DiscoveryView({t,onAddPodcast,onOpenPodcast}){
  const[category,setCategory]=useState(CATEGORIES[0]);
  const[results,setResults]=useState([]);
  const[loading,setLoading]=useState(false);
  const[added,setAdded]=useState({});
  const[search,setSearch]=useState('');
  const[searchMode,setSearchMode]=useState(false);
  const[country,setCountry]=useState(()=>LS.raw('ls_country')||'us');
  const searchTimer=useRef(null);
  const[buddySuggestions]=useState(()=>{try{return(LS.get(BUDDY_KEY,[])||[]).map(sanitizePodcast).filter(Boolean);}catch(e){return[];}});
  useEffect(()=>{if(!searchMode)loadCategory(category);},[category,searchMode,country]);
  async function loadCategory(cat){setLoading(true);setResults([]);try{setResults(cat.id==='top'?await fetchAppleTopV2(country):await fetchItunesTop(cat.id,country));}catch(e){}setLoading(false);}
  function handleSearchInput(val){setSearch(val);clearTimeout(searchTimer.current);if(!val.trim()){setSearchMode(false);return;}setSearchMode(true);searchTimer.current=setTimeout(()=>doSearch(val),500);}
  async function doSearch(q){if(!q.trim())return;setLoading(true);setResults([]);try{setResults(await fetchItunesSearch(q,country));}catch(e){}setLoading(false);}
  function changeCountry(c){setCountry(c);LS.setRaw('ls_country',c);setResults([]);}
  async function handleAdd(podcast){
    const key=podcast.itunes_id||podcast.id||podcast.title;
    setAdded(a=>({...a,[key]:'loading'}));
    try{let feedUrl=podcast.feed_url;if(!feedUrl&&podcast.itunes_id)feedUrl=await fetchItunesFeedUrl(podcast.itunes_id,podcast.title);onAddPodcast({...podcast,feed_url:feedUrl,id:LS.id(),status:'wishlist',addedAt:new Date().toISOString()});setAdded(a=>({...a,[key]:'done'}));}
    catch(e){setAdded(a=>({...a,[key]:'error'}));}
  }
  return(
    <div className="fu">
      <div style={{display:'flex',gap:10,marginBottom:20,alignItems:'center'}}>
        <div style={{flex:1,position:'relative'}}>
          <input value={search} onChange={e=>handleSearchInput(e.target.value)} placeholder="Cerca un podcast per nome..." style={{width:'100%',padding:'10px 40px 10px 14px',background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:10,color:t.text,fontSize:15,boxShadow:`0 1px 8px ${t.shadow}`}}/>
          {search&&<button onClick={()=>{setSearch('');setSearchMode(false);}} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:t.textMuted,fontSize:18,cursor:'pointer',lineHeight:1}}>&#215;</button>}
        </div>
        <div style={{display:'flex',gap:0,flexShrink:0}}>
          {[['us','🇺🇸'],['gb','🇬🇧'],['it','🇮🇹']].map(([c,flag])=>(
            <button key={c} onClick={()=>changeCountry(c)} title={c==='us'?'USA':c==='gb'?'UK':'Italia'}
              style={{padding:'8px 10px',background:country===c?t.accent:'none',border:`1px solid ${t.border}`,borderRadius:c==='us'?'8px 0 0 8px':c==='it'?'0 8px 8px 0':'0',borderRight:c!=='it'?'none':`1px solid ${t.border}`,cursor:'pointer',fontSize:16,transition:'background .15s',lineHeight:1}}>
              {flag}
            </button>
          ))}
        </div>
      </div>
      {!searchMode&&buddySuggestions.length>0&&<div style={{marginBottom:28}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:t.text,marginBottom:14,fontStyle:'italic'}}>❧ Suggeriti da Reading Buddy</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {buddySuggestions.map(p=><BuddySuggestionRow key={p.id||p.title} podcast={p} t={t} onAddPodcast={onAddPodcast}/>)}</div>
      </div>}
      {!searchMode&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>
        {CATEGORIES.map(c=><button key={c.id} onClick={()=>setCategory(c)} style={{padding:'5px 13px',borderRadius:20,border:`1px solid ${t.border}`,fontSize:13,cursor:'pointer',background:category.id===c.id?t.accent:'none',color:category.id===c.id?'#fff':t.textSec}}>{c.label}</button>)}
      </div>}
      {searchMode&&<p style={{fontSize:13,color:t.textMuted,marginBottom:14,fontStyle:'italic'}}>{loading?'Cerco...':`Risultati per "${search}"`}</p>}
      {loading&&<div style={{textAlign:'center',padding:'40px 0'}}><div style={{fontSize:22,color:t.accent,animation:'spin 2s linear infinite',display:'inline-block'}}>✦</div></div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {results.map(p=>{const key=p.itunes_id||p.title;return <PodcastRow key={key} podcast={p} t={t} onAdd={()=>handleAdd(p)} addState={added[key]||''} onClick={()=>onOpenPodcast&&onOpenPodcast(p)}/>;})}</div>
    </div>
  );
}

                  {p.status==='wishlist'&&<button onClick={()=>onFollow(p)} style={{padding:'4px 11px',background:t.accent2Bg,border:`1px solid ${t.accent2}`,borderRadius:6,color:t.accent2,fontSize:12,cursor:'pointer'}}>Segui</button>}
                  <button onClick={()=>onRemove(p.id)} style={{background:'none',border:'none',color:t.textMuted,fontSize:16,cursor:'pointer'}}>🗑</button>
                </div>
              </div>
              {showCollPicker===p.id&&collections?.length>0&&<div style={{borderTop:`1px solid ${t.borderLight}`,padding:'10px 16px',background:t.bgAlt,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{fontSize:11,color:t.textMuted,marginRight:4}}>Collezioni:</span>
                {collections.map(c=>{const inColl=c.podcastIds?.includes(p.id);return <button key={c.id} onClick={()=>onToggleCollection(c.id,p.id)}
                  style={{fontSize:11,padding:'3px 10px',borderRadius:10,border:`1px solid ${c.color}`,background:inColl?c.color+'33':'none',color:inColl?c.color:t.textMuted,cursor:'pointer'}}>

  return <div className="fu">
